<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>9조 리모컨 · BIZ699</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root{ --bg:#000; --fg:#fff; --dim:#777; --accent:#F97316; --panel:#141414; --border:#262626; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--fg);font-family:'Inter','Noto Sans KR',sans-serif;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}

  /* 상단 상태 */
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
  .conn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);letter-spacing:0.04em;}
  .dot{width:9px;height:9px;border-radius:50%;background:#888;}
  .dot.ok{background:#0c0;} .dot.bad{background:#e33;}
  .pageno{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;}
  .pageno .tot{color:var(--dim);font-weight:700;}

  /* 정보 */
  .info{padding:22px 22px 10px;}
  .label{font-size:13px;font-weight:900;letter-spacing:0.14em;color:var(--accent);text-transform:uppercase;}
  .title{font-size:26px;font-weight:900;margin-top:8px;line-height:1.3;word-break:keep-all;}
  .next{font-size:14px;color:var(--dim);margin-top:14px;word-break:keep-all;line-height:1.4;}
  .next b{color:#aaa;}
  .timer{margin-top:16px;font-size:34px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
  .timer.over{color:#e33;}
  .timer .cap{font-size:12px;color:var(--dim);font-weight:700;letter-spacing:0.1em;margin-right:8px;}

  /* 큰 버튼 패드 */
  .pad{flex:1;display:flex;gap:10px;padding:14px;min-height:0;}
  .pad button{flex:1;border:none;border-radius:18px;font-family:inherit;font-size:22px;font-weight:900;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .05s, background .1s;}
  .pad .prev{background:var(--panel);border:1px solid var(--border);}
  .pad .next{background:var(--accent);color:#000;}
  .pad button:active{transform:scale(0.97);}
  .pad .arrow{font-size:54px;line-height:1;}
  .pad .cap{font-size:14px;letter-spacing:0.08em;opacity:.85;}

  /* 하단 보조 */
  .foot{display:flex;gap:10px;padding:0 14px 16px;}
  .foot button{flex:1;background:#000;border:1px solid var(--border);color:#fff;border-radius:14px;padding:16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
  .foot button:active{background:#1a1a1a;}
  .foot .start{border-color:var(--accent);color:var(--accent);}

  /* 연결 대기 오버레이 */
  #wait{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;z-index:10;}
  #wait.hidden{display:none;}
  #wait .big{font-size:22px;font-weight:900;margin-bottom:14px;}
  #wait .sub{font-size:14px;color:var(--dim);line-height:1.6;word-break:keep-all;}
  #wait .spin{width:34px;height:34px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;margin-bottom:24px;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="top">
  <div class="conn"><span class="dot" id="dot"></span><span id="connText">연결 중…</span></div>
  <div class="pageno"><span id="num">–</span><span class="tot"> / <span id="tot">–</span></span></div>
</div>

<div class="info">
  <div class="label" id="label">—</div>
  <div class="title" id="title">슬라이드를 불러오는 중…</div>
  <div class="next" id="next"></div>
  <div class="timer" id="timer"><span class="cap">남은 시간</span><span id="remain">18:00</span></div>
</div>

<div class="pad">
  <button class="prev" id="prev"><span class="arrow">◀</span><span class="cap">이전</span></button>
  <button class="next" id="nextBtn"><span class="arrow">▶</span><span class="cap">다음</span></button>
</div>

<div class="foot">
  <button class="start" id="coverBtn">▶ 시작 / 가림</button>
  <button id="firstBtn">⤒ 처음으로</button>
</div>

<div id="wait">
  <div class="spin"></div>
  <div class="big">노트북에 연결 중…</div>
  <div class="sub">프롬프터 화면에서 <b>📱 리모컨</b> 버튼을 켜고<br>QR이 떠 있는지 확인하세요.<br><br>연결이 안 되면 노트북과 폰을<br><b>같은 핫스팟</b>에 두고 새로고침.</div>
</div>

<script>
const hostId = new URLSearchParams(location.search).get('id');
let conn = null;

function setConn(state, text){
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state==='ok'?' ok':state==='bad'?' bad':'');
  document.getElementById('connText').innerText = text;
}
function buzz(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

if(!hostId){
  document.getElementById('wait').innerHTML = '<div class="big">잘못된 접속</div><div class="sub">QR 코드로 다시 접속하세요.</div>';
} else {
  const peer = new Peer();
  peer.on('open', ()=>{
    conn = peer.connect(hostId, { reliable:true });
    conn.on('open', ()=>{ setConn('ok','연결됨'); document.getElementById('wait').classList.add('hidden'); buzz(40); conn.send({cmd:'hello', role:'remote'}); });
    conn.on('data', d=>{ if(d && d.type==='state') render(d); });
    conn.on('close', ()=>{ setConn('bad','연결 끊김'); });
    conn.on('error', ()=> setConn('bad','오류'));
  });
  peer.on('error', e=>{ setConn('bad','연결 실패'); document.querySelector('#wait .sub').innerHTML = '연결 실패 ('+e.type+').<br>같은 핫스팟인지 확인 후 새로고침.'; });
}

function send(cmd){ if(conn && conn.open){ conn.send({cmd}); buzz(20); } }

document.getElementById('prev').onclick    = ()=> send('prev');
document.getElementById('nextBtn').onclick = ()=> send('next');
document.getElementById('coverBtn').onclick= ()=> send('toggleCover');
document.getElementById('firstBtn').onclick= ()=> send('first');

// 볼륨/방향키 대응 (블루투스 클리커 겸용)
window.onkeydown = (e)=>{
  if(['ArrowRight',' ','PageDown'].includes(e.key)) send('next');
  if(['ArrowLeft','PageUp'].includes(e.key)) send('prev');
};

function render(d){
  document.getElementById('num').innerText   = String(d.idx+1).padStart(2,'0');
  document.getElementById('tot').innerText   = d.total;
  document.getElementById('label').innerText = d.label || '';
  document.getElementById('title').innerText = d.title || '';
  document.getElementById('next').innerHTML  = d.nextTitle ? ('<b>다음 ▸</b> ' + d.nextTitle) : '';
  document.getElementById('remain').innerText= d.remain || '–';
  document.getElementById('timer').classList.toggle('over', !!d.over);
  document.getElementById('coverBtn').innerText = d.covered ? '▶ 발표 시작' : '⏸ 가림';
}

// 화면 꺼짐 방지
async function keepAwake(){ try{ if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); }catch(e){} }
keepAwake();
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') keepAwake(); });
</script>
</body>
</html>
